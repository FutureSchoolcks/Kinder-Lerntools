  function startMode(key) {
    modeKey = key;
    mode = MODES[key];
    round = 0;
    score = 0;

    if (mode.type === 'read') {
      rounds = Array.from({length: 6}, () => ({ time: makeTime(mode.step) }));
      renderRead();
    } else if (mode.type === 'set') {
      rounds = Array.from({length: 5}, () => ({ target: makeTime(mode.step) }));
      renderSet();
    } else if (mode.type === 'memory') {
      startMemory();
    } else if (mode.type === 'daily') {
      rounds = shuffle([...DAILY_EVENTS]).slice(0, 6).map(e => ({ event: e }));
      renderDaily();
    }
  }

  function renderRead() {
    if (round >= rounds.length) { renderResult(); return; }
    const r = rounds[round];
    const t = r.time;

    // 4 Antworten generieren
    const correct = t;
    const answers = [correct];
    const mins = [0, 15, 30, 45, 5, 10, 20, 25, 35, 40, 50, 55];
    while (answers.length < 4) {
      const h = 1 + Math.floor(Math.random() * 12);
      const m = mins[Math.floor(Math.random() * mins.length)];
      if (m % mode.step !== 0) continue;
      if (!answers.some(a => a.h === h && a.m === m)) {
        answers.push({ h, m });
      }
    }
    const shuffled = shuffle(answers);
    r.choices = shuffled;

    const progress = (round / rounds.length) * 100;
    const ansButtons = shuffled.map((a, i) => `
      <button class="answer-btn" style="flex-direction:column;padding:10px;font-size:18px;" onclick="Turtle.answerRead(${i}, this)">
        <div style="font-family:'Righteous',cursive;font-size:26px;">${timeToDigital(a)}</div>
        <div style="font-size:14px;color:var(--shadow);">${timeToText(a)}</div>
      </button>
    `).join('');

    document.getElementById('app').innerHTML = `
      <div class="game-header">
        <button class="icon-btn" onclick="Turtle.renderMenu()">🏠</button>
        <div class="game-title">${mode.emoji} ${round+1}/${rounds.length}</div>
        <div class="score-badge"><span>⭐</span><span>${score}</span></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="game-area">
        <div class="question-card" style="display:flex;flex-direction:column;align-items:center;">
          <button class="speaker-btn" onclick="Turtle.speakTime()">🔊</button>
          <div style="font-family:'Caveat',cursive;font-size:24px;color:var(--shadow);margin-bottom:10px;font-weight:700;">Wie spät ist es?</div>
          ${makeClockSVG(t, 200)}
        </div>
        <div class="answer-grid cols-2">${ansButtons}</div>
      </div>
    `;
    answering = false;
  }

  function speakTime() {
    const r = rounds[round];
    const btn = document.querySelector('.speaker-btn');
    if (btn) btn.classList.add('speaking');
    speak('Wie spät ist es?', { onend: () => {
      const b = document.querySelector('.speaker-btn');
      if (b) b.classList.remove('speaking');
    }});
  }

  function answerRead(idx, btn) {
    if (answering) return;
    answering = true;
    const r = rounds[round];
    const correct = timesEqual(r.choices[idx], r.time);
    if (correct) {
      btn.classList.add('correct');
      score++;
      addStars(mode.diff);
      showFeedback('🌟', 'Richtig!');
      triggerConfetti(['🐢','⭐','🌿']);
      speak('Richtig! Es ist ' + timeToText(r.time), { pitch: 1.3 });
    } else {
      btn.classList.add('wrong');
      document.querySelectorAll('.answer-btn').forEach((b, i) => {
        if (timesEqual(r.choices[i], r.time)) b.classList.add('correct');
      });
      showFeedback('💫', 'Fast!');
      speak('Nicht ganz. Es ist ' + timeToText(r.time));
    }
    const badge = document.querySelector('.score-badge');
    if (badge) badge.innerHTML = `<span>⭐</span><span>${score}</span>`;
    setTimeout(() => { round++; renderRead(); }, 2200);
  }

  // SET-Modus: Zeiger per Drag setzen
  function renderSet() {
    if (round >= rounds.length) { renderResult(); return; }
    const r = rounds[round];
    setTargetTime = r.target;
    // Starten mit 12:00
    if (!r.userTime) r.userTime = { h: 12, m: 0 };

    const progress = (round / rounds.length) * 100;
    const showMinBtn = mode.step < 60;
    document.getElementById('app').innerHTML = `
      <div class="game-header">
        <button class="icon-btn" onclick="Turtle.renderMenu()">🏠</button>
        <div class="game-title">${mode.emoji} ${round+1}/${rounds.length}</div>
        <div class="score-badge"><span>⭐</span><span>${score}</span></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="game-area">
        <div class="question-card" style="display:flex;flex-direction:column;align-items:center;">
          <button class="speaker-btn" onclick="Turtle.speakSetTarget()">🔊</button>
          <div style="font-family:'Caveat',cursive;font-size:22px;color:var(--shadow);margin-bottom:6px;font-weight:700;">Stell die Uhr auf:</div>
          <div style="font-family:'Righteous',cursive;font-size:32px;color:var(--shadow);margin-bottom:4px;">${timeToDigital(r.target)}</div>
          <div style="font-size:18px;color:var(--text);margin-bottom:6px;">${timeToText(r.target)}</div>
          <div style="font-size:14px;color:#666;margin-bottom:10px;">💡 Du kannst die Zeiger ziehen oder die Knöpfe benutzen</div>
          <div id="setClockWrap">${makeClockSVG(r.userTime, 240, true)}</div>
          <div style="margin-top:10px;font-family:'Righteous',cursive;font-size:24px;color:#666;">
            Aktuell: <span id="setLiveTime">${timeToDigital(r.userTime)}</span>
          </div>
          <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;justify-content:center;">
            <button class="answer-btn" style="padding:10px 16px;font-size:16px;min-height:44px;" onclick="Turtle.adjustSet('h', -1)">🕐 Stunde -</button>
            <button class="answer-btn" style="padding:10px 16px;font-size:16px;min-height:44px;" onclick="Turtle.adjustSet('h', 1)">🕐 Stunde +</button>
            ${showMinBtn ? `
              <button class="answer-btn" style="padding:10px 16px;font-size:16px;min-height:44px;" onclick="Turtle.adjustSet('m', ${-mode.step})">⏱️ Min -${mode.step}</button>
              <button class="answer-btn" style="padding:10px 16px;font-size:16px;min-height:44px;" onclick="Turtle.adjustSet('m', ${mode.step})">⏱️ Min +${mode.step}</button>
            ` : ''}
          </div>
        </div>
        <button class="btn" onclick="Turtle.checkSet()" style="min-height:56px;">
          <span>✓</span><span>Fertig</span>
        </button>
      </div>
    `;
    answering = false;
    setTimeout(attachClockDrag, 50);
  }

  let _clockDragHandlers = null;
  function attachClockDrag() {
    const svg = document.getElementById('setClock');
    if (!svg) return;

    // Vorherige Handler entfernen, falls noch vorhanden
    if (_clockDragHandlers) {
      window.removeEventListener('pointermove', _clockDragHandlers.move);
      window.removeEventListener('pointerup', _clockDragHandlers.up);
      window.removeEventListener('pointercancel', _clockDragHandlers.up);
      _clockDragHandlers = null;
    }

    const hourGroup = document.getElementById('hourHandGroup');
    const minGroup = document.getElementById('minHandGroup');
    const digitalEl = document.getElementById('setDigital');
    const wordsEl = document.getElementById('setWords');
    let activeHand = null; // 'hour' | 'min' | null

    function getAngleFromCenter(e) {
      const rect = svg.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      // Math.atan2: 0° = rechts, dreht gegen Uhrzeigersinn
      // Wir brauchen: 0° = oben (12), Uhrzeigersinn positiv
      let ang = Math.atan2(dy, dx) * 180 / Math.PI + 90;
      if (ang < 0) ang += 360;
      return ang;
    }

    function snapMin(deg) {
      // 360° = 60 min → 1 min = 6°
      const minRaw = deg / 6;
      const step = mode.step < 60 ? mode.step : 5;
      const snapped = Math.round(minRaw / step) * step;
      return ((snapped % 60) + 60) % 60;
    }

    function snapHour(deg) {
      // 360° = 12 h → 1 h = 30°
      const hRaw = deg / 30;
      let snapped = Math.round(hRaw) % 12;
      if (snapped === 0) snapped = 12;
      return snapped;
    }

    function updateDisplays() {
      const r = rounds[round];
      const hourDeg = ((r.userTime.h % 12) + r.userTime.m / 60) * 30;
      const minDeg = r.userTime.m * 6;
      if (hourGroup) hourGroup.setAttribute('transform', `rotate(${hourDeg} 100 100)`);
      if (minGroup) minGroup.setAttribute('transform', `rotate(${minDeg} 100 100)`);
      // Optional: kleine Live-Anzeige unten (falls vorhanden)
      const live = document.getElementById('setLiveTime');
      if (live) live.textContent = timeToDigital(r.userTime);
    }

    function pointerDown(e) {
      e.preventDefault();
      const rect = svg.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const radius = rect.width / 2;

      // Außen → Minute, innen → Stunde. Bei step==60 nur Stunde.
      if (mode.step >= 60) {
        activeHand = 'hour';
      } else if (dist > radius * 0.55) {
        activeHand = 'min';
      } else {
        activeHand = 'hour';
      }
      svg.style.cursor = 'grabbing';
      pointerMove(e); // direkt setzen
    }

    function pointerMove(e) {
      if (!activeHand) return;
      e.preventDefault();
      const ang = getAngleFromCenter(e);
      const r = rounds[round];
      if (activeHand === 'min') {
        r.userTime.m = snapMin(ang);
      } else {
        r.userTime.h = snapHour(ang);
      }
      updateDisplays();
    }

    function pointerUp() {
      activeHand = null;
      svg.style.cursor = 'grab';
    }

    svg.addEventListener('pointerdown', pointerDown);
    window.addEventListener('pointermove', pointerMove);
    window.addEventListener('pointerup', pointerUp);
    window.addEventListener('pointercancel', pointerUp);

    _clockDragHandlers = { move: pointerMove, up: pointerUp };
  }

  function speakSetTarget() {
    const r = rounds[round];
    const btn = document.querySelector('.speaker-btn');
    if (btn) btn.classList.add('speaking');
    speak('Stell die Uhr auf ' + timeToText(r.target), { onend: () => {
      const b = document.querySelector('.speaker-btn');
      if (b) b.classList.remove('speaking');
    }});
  }

  function adjustSet(field, delta) {
    const r = rounds[round];
    if (field === 'h') {
      r.userTime.h += delta;
      if (r.userTime.h < 1) r.userTime.h = 12;
      if (r.userTime.h > 12) r.userTime.h = 1;
    } else {
      r.userTime.m += delta;
      while (r.userTime.m < 0) r.userTime.m += 60;
      while (r.userTime.m >= 60) r.userTime.m -= 60;
    }
    // Nur die Transforms aktualisieren — SVG nicht neu bauen, sonst gehen die Drag-Listener verloren
    const hourGroup = document.getElementById('hourHandGroup');
    const minGroup = document.getElementById('minHandGroup');
    if (hourGroup && minGroup) {
      const hourDeg = ((r.userTime.h % 12) + r.userTime.m / 60) * 30;
      const minDeg = r.userTime.m * 6;
      hourGroup.setAttribute('transform', `rotate(${hourDeg} 100 100)`);
      minGroup.setAttribute('transform', `rotate(${minDeg} 100 100)`);
    } else {
      // Fallback: wenn Gruppen nicht existieren, doch neu rendern und Drag neu attachen
      const wrap = document.getElementById('setClockWrap');
      if (wrap) wrap.innerHTML = makeClockSVG(r.userTime, 240, true);
      setTimeout(attachClockDrag, 10);
    }
    const live = document.getElementById('setLiveTime');
    if (live) live.textContent = timeToDigital(r.userTime);
  }

  function checkSet() {
    if (answering) return;
    answering = true;
    const r = rounds[round];
    const correct = timesEqual(r.userTime, r.target);
    if (correct) {
      score++;
      addStars(mode.diff);
      showFeedback('🌟', 'Genau richtig!');
      triggerConfetti(['🐢','⭐','🌿']);
      speak('Richtig!', { pitch: 1.3 });
    } else {
      showFeedback('💫', 'Fast! Richtig wäre: ' + timeToText(r.target));
      speak('Die richtige Zeit ist ' + timeToText(r.target));
    }
    const badge = document.querySelector('.score-badge');
    if (badge) badge.innerHTML = `<span>⭐</span><span>${score}</span>`;
    setTimeout(() => { round++; renderSet(); }, 2200);
  }

  // MEMORY
  function startMemory() {
    const count = mode.diff === 2 ? 6 : 8;
    const times = [];
    while (times.length < count) {
      const t = makeTime(mode.step);
      if (!times.some(x => timesEqual(x, t))) times.push(t);
    }
    memCards = shuffle(times.flatMap(t => [
      { type: 'analog', time: t },
      { type: 'digital', time: t }
    ]));
    memFlipped = [];
    memMatched = 0;
    renderMemory();
  }

  function renderMemory() {
    const cols = memCards.length <= 8 ? 4 : 4;
    const size = Math.min(120, 500 / cols);
    const cards = memCards.map((c, i) => `
      <div class="mem-card" data-idx="${i}" onclick="Turtle.flipMemCard(${i})"
        style="aspect-ratio:1;background:linear-gradient(135deg, var(--accent), var(--accent-light));border:3px solid var(--shadow);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 var(--shadow);color:transparent;font-size:14px;padding:4px;">
      </div>
    `).join('');
    document.getElementById('app').innerHTML = `
      <div class="game-header">
        <button class="icon-btn" onclick="Turtle.renderMenu()">🏠</button>
        <div class="game-title">🎴 Uhr-Memory</div>
        <div class="score-badge"><span>⭐</span><span>${score}</span></div>
      </div>
      <div class="game-area">
        <div class="question-card" style="width:100%;">
          <div style="font-family:'Caveat',cursive;font-size:22px;color:var(--shadow);text-align:center;font-weight:700;margin-bottom:10px;">Finde die passenden Paare!</div>
          <div style="display:grid;grid-template-columns:repeat(${cols}, minmax(0, ${size}px));gap:8px;justify-content:center;">
            ${cards}
          </div>
        </div>
      </div>
    `;
    answering = false;
  }

  function flipMemCard(idx) {
    if (answering) return;
    const el = document.querySelector(`.mem-card[data-idx="${idx}"]`);
    if (!el || el.classList.contains('flipped') || el.classList.contains('matched')) return;
    if (memFlipped.length >= 2) return;
    const card = memCards[idx];
    el.classList.add('flipped');
    el.style.background = 'white';
    el.style.color = 'var(--shadow)';
    if (card.type === 'analog') {
      el.innerHTML = makeClockSVG(card.time, 70);
    } else {
      el.innerHTML = `<div style="font-family:'Righteous',cursive;font-size:clamp(18px,4vw,26px);color:var(--shadow);">${timeToDigital(card.time)}</div>`;
    }

    if (memFlipped.length === 2) {
      answering = true;

          b.el.style.color = 'transparent';
          a.el.innerHTML = '';
          b.el.innerHTML = '';
          memFlipped = [];
          answering = false;
        }, 1100);
      }
    }
  }

  // DAILY
  function renderDaily() {
    if (round >= rounds.length) { renderResult(); return; }
    const r = rounds[round];
    const event = r.event;

    // 4 Zeiten: eine richtige + 3 Distraktoren
    const correct = { h: event.time > 12 ? event.time - 12 : event.time, m: 0 };
    const allTimes = DAILY_EVENTS.filter(e => e.time !== event.time).map(e => ({ h: e.time > 12 ? e.time - 12 : e.time, m: 0 }));
    const distractors = shuffle(allTimes).slice(0, 3);
    const choices = shuffle([correct, ...distractors]);
    r.choices = choices;

    const progress = (round / rounds.length) * 100;
    const ansButtons = choices.map((a, i) => `
      <button class="answer-btn" style="flex-direction:column;padding:8px;min-height:140px;" onclick="Turtle.answerDaily(${i}, this)">
        ${makeClockSVG(a, 90)}
      </button>
    `).join('');

    document.getElementById('app').innerHTML = `
      <div class="game-header">
        <button class="icon-btn" onclick="Turtle.renderMenu()">🏠</button>

      <div class="game-area">

          <div style="font-size:80px;margin:10px 0;">${event.emoji}</div>
          <div style="font-family:'Caveat',cursive;font-size:clamp(22px,4vw,30px);color:var(--shadow);font-weight:700;">Wann ist ${event.label}?</div>
        </div>

    answering = false;
  }

  function speakDaily() {
    const r = rounds[round];
    const btn = document.querySelector('.speaker-btn');
    if (btn) btn.classList.add('speaking');
    speak('Wann ist ' + r.event.label + '?', { onend: () => {
      const b = document.querySelector('.speaker-btn');
      if (b) b.classList.remove('speaking');

  }

  function answerDaily(idx, btn) {

    const correctTime = { h: event.time > 12 ? event.time - 12 : event.time, m: 0 };
    const chosen = r.choices[idx];
    const correct = timesEqual(chosen, correctTime);
    if (correct) {
      btn.classList.add('correct');
      score++;
      addStars(mode.diff);

      });
      showFeedback('💫', 'Fast!');
    }
    const badge = document.querySelector('.score-badge');
    if (badge) badge.innerHTML = `<span>⭐</span><span>${score}</span>`;
    setTimeout(() => { round++; renderDaily(); }, 1900);
  }

  function renderResult() {
    let total, pct;
    if (mode.type === 'memory') {
      total = memCards.length / 2;
      pct = score / total;
    } else {
      total = rounds.length;

    if (pct >= 0.9) { stars = '⭐⭐⭐'; text = 'Super!'; }
    else if (pct >= 0.6) { stars = '⭐⭐'; text = 'Toll!'; }
    else if (pct >= 0.3) { stars = '⭐'; text = 'Gut!'; }

    document.getElementById('app').innerHTML = `
      <div class="game-header">
        <button class="icon-btn" onclick="Turtle.renderMenu()">🏠</button>

      <div class="screen">

        <div class="result-big">${score} / ${total}</div>
        <div style="font-family:'Caveat',cursive;font-size:clamp(26px,5vw,36px);color:var(--shadow);font-weight:700;">${text}</div>
        <button class="btn" onclick="Turtle.startMode('${modeKey}')">

        <button class="btn btn-secondary" onclick="Turtle.renderMenu()">

        </button>
      </div>
    `;
    if (pct >= 0.6) { setTimeout(()=>triggerConfetti(['🐢','⭐','🌿']),200); }
  }

  return { start, renderMenu, showHelp, startMode, answerRead, speakTime, adjustSet, checkSet, speakSetTarget, flipMemCard, answerDaily, speakDaily };
})();

const Bee = (function() {

  let selectedCell = null;
  let noteMode = false;
  let useSymbols = false;
  let checkMode = 'end';  // 'immediate' or 'end'
  let mistakes = 0;

  function start() {
    setTheme('bee');
    createDeco(['🐝','🌻','🌼','🍯','🐞']);

  }

  function renderMenu() {
    const cards = Object.entries(MODES).map(([key, m]) => {

  function pickMode(key) {

    document.getElementById('app').innerHTML = `
      <div class="game-header">
        <button class="icon-btn" onclick="Bee.renderMenu()">🏠</button>
        <div class="game-title">🐝 ${mode.name}</div>

      </div>
      <div class="game-area">
        <div class="question-card" style="width:100%;max-width:400px;">
          <div style="font-family:'Caveat',cursive;font-size:24px;color:var(--shadow);text-align:center;font-weight:700;margin-bottom:14px;">Wie spielen?</div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <button class="answer-btn" style="font-size:18px;min-height:52px;" onclick="Bee.setOptions(false, 'immediate')">
              🔢 Zahlen • Fehler sofort
            </button>
            <button class="answer-btn" style="font-size:18px;min-height:52px;" onclick="Bee.setOptions(false, 'end')">
              🔢 Zahlen • Erst am Ende prüfen
            </button>
            <button class="answer-btn" style="font-size:18px;min-height:52px;" onclick="Bee.setOptions(true, 'immediate')">
              🐝 Tiere • Fehler sofort
            </button>
            <button class="answer-btn" style="font-size:18px;min-height:52px;" onclick="Bee.setOptions(true, 'end')">
              🐝 Tiere • Erst am Ende prüfen
            </button>
          </div>
        </div>
      </div>
    `;
  }

  function setOptions(symbols, check) {
    useSymbols = symbols;
    checkMode = check;
    startGame();
  }

  // Sudoku-Generator
  function shuffleArray(a) { return [...a].sort(() => Math.random() - 0.5); }

  function isValid(g, r, c, n, size) {
    for (let i = 0; i < size; i++) {
      if (g[r][i] === n || g[i][c] === n) return false;
    }
    const boxR = size === 4 ? 2 : size === 6 ? 2 : 3;
    const boxC = size === 4 ? 2 : size === 6 ? 3 : 3;
    const rStart = Math.floor(r / boxR) * boxR;
    const cStart = Math.floor(c / boxC) * boxC;
    for (let i = rStart; i < rStart + boxR; i++) {
      for (let j = cStart; j < cStart + boxC; j++) {
        if (g[i][j] === n) return false;
      }
    }
    return true;
  }

  function solveSudoku(g, size) {
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        if (g[r][c] === 0) {
          const nums = shuffleArray(Array.from({length: size}, (_, i) => i + 1));
          for (const n of nums) {
            if (isValid(g, r, c, n, size)) {
              g[r][c] = n;
              if (solveSudoku(g, size)) return true;
              g[r][c] = 0;
            }
          }
          return false;
        }
      }
    }
    return true;
  }

  function generateSudoku(size, fillPct) {
    const g = Array.from({length: size}, () => Array(size).fill(0));
    solveSudoku(g, size);
    const sol = g.map(row => [...row]);
    // Nun Zellen entfernen
    const cells = [];
    for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) cells.push([r,c]);
    const toKeep = Math.round(size * size * fillPct);
    const toRemove = size * size - toKeep;
    const shuffled = shuffleArray(cells);
    for (let i = 0; i < toRemove; i++) {
      const [r,c] = shuffled[i];
      g[r][c] = 0;
    }
    return { puzzle: g, solution: sol };
  }

  function startGame() {
    const { puzzle, solution: sol } = generateSudoku(mode.size, mode.fillPct);
    board = puzzle.map(r => [...r]);
    solution = sol;
    locked = puzzle.map(r => r.map(v => v !== 0));
    notes = Array.from({length: mode.size}, () => Array.from({length: mode.size}, () => new Set()));
    selectedCell = null;
    noteMode = false;
    mistakes = 0;
    renderBoard();
  }

  function renderBoard() {
    const size = mode.size;
    const syms = TIER_SYMBOLE[size];
    const boxR = size === 4 ? 2 : size === 6 ? 2 : 3;
    const boxC = size === 4 ? 2 : size === 6 ? 3 : 3;

    let cellSize;
    const available = Math.min(window.innerWidth - 50, 500);
    cellSize = Math.floor(available / size);
    if (cellSize > 60) cellSize = 60;

    let cellsHtml = '';
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        const v = board[r][c];
        const isLocked = locked[r][c];
        const isSel = selectedCell && selectedCell[0] === r && selectedCell[1] === c;
        const isSameVal = selectedCell && v !== 0 && board[selectedCell[0]][selectedCell[1]] === v;
        const isSameRC = selectedCell && (selectedCell[0] === r || selectedCell[1] === c);

        const boxTop = r % boxR === 0;
        const boxLeft = c % boxC === 0;
        const boxBottom = r === size - 1;
        const boxRight = c === size - 1;

        let style = `
          width:${cellSize}px;height:${cellSize}px;
          display:flex;align-items:center;justify-content:center;
          border:1px solid #d4a657;
          border-top-width:${boxTop ? '3px' : '1px'};
          border-left-width:${boxLeft ? '3px' : '1px'};
          border-bottom-width:${boxBottom ? '3px' : '1px'};
          border-right-width:${boxRight ? '3px' : '1px'};
          border-color:#d4a657;
          background:${isSel ? '#fff176' : isSameVal ? '#fff9c4' : isSameRC ? '#fffde7' : 'white'};
          font-family:'Righteous',cursive;
          font-size:${useSymbols ? '22px' : '22px'};
          font-weight:700;
          color:${isLocked ? '#5d4037' : '#ef6c00'};
          cursor:pointer;
          position:relative;
        `;

        let content = '';
        if (v !== 0) {
          content = useSymbols ? syms[v-1] : v;
        } else if (notes[r][c].size > 0) {
          const noteGrid = Array.from(notes[r][c]).sort().map(n =>
            `<span>${useSymbols ? syms[n-1] : n}</span>`
          ).join('');
          content = `<div style="font-size:10px;color:#888;display:flex;flex-wrap:wrap;gap:1px;padding:2px;line-height:1;width:100%;height:100%;align-content:center;justify-content:center;">${noteGrid}</div>`;
        }

        cellsHtml += `<div style="${style}" onclick="Bee.selectCell(${r}, ${c})">${content}</div>`;
      }
    }

    const numButtons = Array.from({length: size}, (_, i) => {
      const n = i + 1;

      return `<button class="answer-btn" style="padding:10px;font-size:22px;min-height:52px;" onclick="Bee.inputNumber(${n})">${display}</button>`;
    }).join('');

          ${cellsHtml}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
          <button class="answer-btn ${noteMode ? 'correct' : ''}" style="padding:8px 14px;font-size:14px;min-height:40px;" onclick="Bee.toggleNote()">📝 ${noteMode ? 'Notiz AN' : 'Notiz'}</button>
          <button class="answer-btn" style="padding:8px 14px;font-size:14px;min-height:40px;" onclick="Bee.clearCell()">🧹 Löschen</button>
          ${checkMode === 'end' ? `<button class="answer-btn" style="padding:8px 14px;font-size:14px;min-height:40px;background:#b8f5c9;" onclick="Bee.checkAll()">✓ Prüfen</button>` : ''}
        </div>
        <div style="display:grid;grid-template-columns:repeat(${size}, 1fr);gap:5px;width:100%;max-width:${size*55}px;">
          ${numButtons}
        </div>
      </div>
    `;
  }

  function selectCell(r, c) {
    if (locked[r][c]) {
      selectedCell = [r, c];
    } else {
      selectedCell = [r, c];
    }
    renderBoard();
  }

  function toggleNote() {
    noteMode = !noteMode;
    renderBoard();
  }

  function inputNumber(n) {
    if (!selectedCell) return;
    const [r, c] = selectedCell;
    if (locked[r][c]) return;

    if (noteMode) {
      if (notes[r][c].has(n)) notes[r][c].delete(n);
      else notes[r][c].add(n);
      board[r][c] = 0;
    } else {
      if (board[r][c] === n) {
        board[r][c] = 0;
      } else {
        board[r][c] = n;
        notes[r][c].clear();
        if (checkMode === 'immediate') {
          if (solution[r][c] !== n) {
            mistakes++;
            setTimeout(() => {
              // Zurücksetzen
              board[r][c] = 0;
              renderBoard();
            }, 800);
            renderBoard();
            showFeedback('💫', 'Falsch!');
            return;
          }
        }
        // Check ob alles gelöst
        if (isSolved()) {
          setTimeout(() => {
            triggerConfetti(['🐝','⭐','🍯','🌻']);
            renderWin();
          }, 300);
        }
      }
    }
    renderBoard();
  }

  function clearCell() {
    if (!selectedCell) return;
    const [r, c] = selectedCell;
    if (locked[r][c]) return;
    board[r][c] = 0;
    notes[r][c].clear();
    renderBoard();
  }

  function isSolved() {
    for (let r = 0; r < mode.size; r++) {
      for (let c = 0; c < mode.size; c++) {
        if (board[r][c] !== solution[r][c]) return false;
      }
    }
    return true;
  }

  function checkAll() {
    if (isSolved()) {
      triggerConfetti(['🐝','⭐','🍯','🌻']);
      renderWin();
    } else {
      // Fehler zählen
      let errors = 0;
      for (let r = 0; r < mode.size; r++) {
        for (let c = 0; c < mode.size; c++) {
          if (board[r][c] !== 0 && board[r][c] !== solution[r][c]) errors++;
        }
      }
      const missing = mode.size * mode.size - board.flat().filter(v => v !== 0).length;
      if (missing > 0) {
        showFeedback('💫', 'Noch ' + missing + ' Felder leer');
      } else {
        showFeedback('💫', errors + ' Fehler gefunden');
        // Fehler markieren
        for (let r = 0; r < mode.size; r++) {
          for (let c = 0; c < mode.size; c++) {
            if (board[r][c] !== 0 && board[r][c] !== solution[r][c]) {
              board[r][c] = 0;
            }
          }
        }
        setTimeout(renderBoard, 800);
      }
    }
  }

  function renderWin() {
    const bonus = mistakes === 0 ? mode.diff * 2 : mode.diff;
    addStars(bonus);
    document.getElementById('app').innerHTML = `
      <div class="game-header">
        <button class="icon-btn" onclick="Bee.renderMenu()">🏠</button>
        <div class="game-title">Gelöst!</div>
        <div class="score-badge"><span>⭐</span><span>${getStars()}</span></div>
      </div>
      <div class="screen">
        <div class="result-stars">🏆</div>
        <div class="result-big">Sudoku gelöst!</div>
        <div style="font-size:20px;color:var(--shadow);font-weight:700;">+${bonus} ⭐</div>
        ${mistakes === 0 ? '<div style="font-family:\'Caveat\',cursive;font-size:26px;color:#ef6c00;font-weight:700;">Ohne Fehler! Doppelt Sterne!</div>' : ''}
        <button class="btn" onclick="Bee.pickMode('${modeKey}')">
          <span style="font-size:1.4em;">🔄</span><span>Neues Sudoku</span>
        </button>
        <button class="btn btn-secondary" onclick="Bee.renderMenu()">
          <span style="font-size:1.4em;">🏠</span><span>Zurück</span>
        </button>
      </div>
    `;
  }

  return { start, renderMenu, pickMode, setOptions, selectCell, toggleNote, inputNumber, clearCell, checkAll };
})();

          <div class="level-label">${m.name}</div>
          <div class="level-stars">${stars}</div>
        </div>
      `;
    }).join('');
    document.getElementById('app').innerHTML = `
      <div class="game-header">
        <button class="icon-btn" onclick="renderForest()">🏠</button>
        <div class="game-title">🐸 Frosch-Hüpfer</div>
        <div class="score-badge"><span>⭐</span><span>${getStars()}</span></div>
      </div>
      <div class="game-area" style="justify-content:flex-start;">
        <div class="level-grid">${cards}</div>
      </div>
    `;
  }

  function startMode(key) {
    modeKey = key;
    mode = MODES[key];
    sequence = [];
    userSeq = [];
    level = 0;
    score = 0;
    if (mode.type === 'classic') startClassic();
    else if (mode.type === 'pattern') startPattern();
    else if (mode.type === 'colors') startColors();
  }

  // CLASSIC: 4 Farbfelder leuchten in Reihenfolge
  function startClassic() {
    sequence = [];
    level = 0;
    addClassicStep();
  }

  function addClassicStep() {
    sequence.push(Math.floor(Math.random() * 4));
    userSeq = [];
    level++;
    renderClassic();
    setTimeout(() => showClassicSequence(), 500);
  }

  function renderClassic() {
    const tiles = COLORS.map((c, i) => `
      <div class="classic-tile" data-idx="${i}" onclick="Frog.tapClassic(${i})"
        style="background:${c.bg};border:4px solid rgba(0,0,0,0.2);border-radius:20px;aspect-ratio:1;cursor:pointer;transition:all 0.2s ease;box-shadow:0 6px 0 rgba(0,0,0,0.25);">
      </div>
    `).join('');
    document.getElementById('app').innerHTML = `
      <div class="game-header">
        <button class="icon-btn" onclick="Frog.renderMenu()">🏠</button>
        <div class="game-title">🎯 Runde ${level}</div>
        <div class="score-badge"><span>⭐</span><span>${score}</span></div>
      </div>
      <div class="game-area">
        <div class="question-card" style="width:100%;max-width:500px;">
          <div style="font-family:'Caveat',cursive;font-size:28px;color:var(--shadow);text-align:center;font-weight:700;margin-bottom:14px;">Merke dir die Reihenfolge!</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            ${tiles}
          </div>
        </div>
      </div>
    `;
  }

  function showClassicSequence() {
    showing = true;
    const tiles = document.querySelectorAll('.classic-tile');
    let i = 0;
    function showNext() {
      if (i >= sequence.length) {
        showing = false;
        return;
      }
      const idx = sequence[i];
      const tile = tiles[idx];
      if (!tile) return;
      tile.style.background = COLORS[idx].bgLight;
      tile.style.transform = 'scale(0.95)';
      tile.style.boxShadow = '0 2px 0 rgba(0,0,0,0.25)';
      setTimeout(() => {
        tile.style.background = COLORS[idx].bg;
        tile.style.transform = '';
        tile.style.boxShadow = '0 6px 0 rgba(0,0,0,0.25)';
        i++;
        setTimeout(showNext, 200);
      }, 500);
    }
    showNext();
  }

  function tapClassic(idx) {
    if (showing) return;
    const tiles = document.querySelectorAll('.classic-tile');
    const tile = tiles[idx];
    // Kurz aufleuchten
    tile.style.background = COLORS[idx].bgLight;
    tile.style.transform = 'scale(0.95)';
    setTimeout(() => {
      tile.style.background = COLORS[idx].bg;
      tile.style.transform = '';
    }, 150);

    userSeq.push(idx);
    const pos = userSeq.length - 1;
    if (userSeq[pos] !== sequence[pos]) {
      // Falsch
      setTimeout(() => {
        showFeedback('💫', 'Oh! Geschafft: ' + (level - 1));
        showing = true;
        if (level > 1) {
          score = level - 1;
          addStars(Math.floor(score / 2));
        }
        setTimeout(() => renderClassicResult(), 1600);
      }, 200);
      return;
    }
    if (userSeq.length === sequence.length) {
      // Richtig abgeschlossen, nächste Runde
      showFeedback('🌟', 'Super!');
      triggerConfetti(['🐸','⭐','🌿']);
      setTimeout(() => addClassicStep(), 1000);
    }
  }

  function renderClassicResult() {
    document.getElementById('app').innerHTML = `
      <div class="game-header">
        <button class="icon-btn" onclick="Frog.renderMenu()">🏠</button>
        <div class="game-title">Geschafft!</div>
        <div class="score-badge"><span>⭐</span><span>${getStars()}</span></div>
      </div>
      <div class="screen">
        <div class="result-stars">🐸</div>
        <div class="result-big">Runde ${level - 1}</div>
        <div style="font-size:20px;color:var(--shadow);font-weight:700;">+${Math.floor((level-1)/2)} ⭐</div>
        <button class="btn" onclick="Frog.startMode('classic')">
          <span style="font-size:1.4em;">🔄</span><span>Nochmal</span>
        </button>
        <button class="btn btn-secondary" onclick="Frog.renderMenu()">
          <span style="font-size:1.4em;">🏠</span><span>Zurück</span>
        </button>
      </div>
    `;
  }

  // PATTERN: 4x4 Gitter zeigt Muster, dann verstecken, sie muss tippen
  let patternGrid = [];
  let patternTaps = [];
  let patternStage = 'showing';
  let patternMissing = 3;

  function startPattern() {
    patternMissing = 3;
    patternTaps = [];
    level = 1;
    score = 0;
    nextPattern();
  }

  function nextPattern() {
    // Muster generieren
    const gridSize = 4;
    patternGrid = Array.from({length: gridSize*gridSize}, () => false);
    let chosen = new Set();
    while (chosen.size < patternMissing) {
      chosen.add(Math.floor(Math.random() * gridSize*gridSize));
    }
    chosen.forEach(i => patternGrid[i] = true);
    patternTaps = [];
    patternStage = 'showing';
    renderPattern(true);
    setTimeout(() => {
      patternStage = 'tapping';
      renderPattern(false);
    }, 2500 + patternMissing * 300);
  }

  function renderPattern(reveal) {
    const size = 4;
    const tiles = patternGrid.map((lit, i) => {
      const tapped = patternTaps.includes(i);
      const showLit = reveal && lit;
      return `<div class="pat-tile" data-idx="${i}" onclick="Frog.tapPattern(${i})"
        style="aspect-ratio:1;background:${showLit ? '#4db6ac' : tapped ? '#80cbc4' : '#e0f2f1'};border:3px solid var(--shadow);border-radius:10px;cursor:${reveal ? 'default' : 'pointer'};box-shadow:0 3px 0 var(--shadow);transition:all 0.2s ease;"></div>`;
    }).join('');
    document.getElementById('app').innerHTML = `
      <div class="game-header">
        <button class="icon-btn" onclick="Frog.renderMenu()">🏠</button>
        <div class="game-title">🟦 ${patternMissing} Felder · Runde ${level}</div>
        <div class="score-badge"><span>⭐</span><span>${score}</span></div>
      </div>
      <div class="game-area">
        <div class="question-card" style="width:100%;max-width:400px;">
          <div style="font-family:'Caveat',cursive;font-size:24px;color:var(--shadow);text-align:center;font-weight:700;margin-bottom:12px;">
            ${reveal ? 'Merke dir die Felder!' : 'Tippe sie alle an!'}
          </div>
          <div style="display:grid;grid-template-columns:repeat(${size}, 1fr);gap:6px;">
            ${tiles}
          </div>
          <div style="text-align:center;margin-top:10px;font-size:14px;color:var(--text);">
            ${reveal ? '' : `Getippt: ${patternTaps.length} / ${patternMissing}`}
          </div>
        </div>
      </div>
    `;
  }

  function tapPattern(i) {
    if (patternStage !== 'tapping') return;
    if (patternTaps.includes(i)) return;
    if (!patternGrid[i]) {
      // Falsch!
      const el = document.querySelector(`.pat-tile[data-idx="${i}"]`);
      if (el) {
        el.style.background = '#ef4444';
        setTimeout(() => el.style.background = '#e0f2f1', 400);
      }
      setTimeout(() => {
        showFeedback('💫', 'Oh! Geschafft: Runde ' + (level - 1));
        score = level - 1;
        addStars(score);
        setTimeout(() => renderClassicResult(), 1600);
      }, 400);
      patternStage = 'done';
      return;
    }
    patternTaps.push(i);
    renderPattern(false);
    // Richtig getippte Felder kurz markieren
    if (patternTaps.length === patternMissing) {
      score = level;
      addStars(1);
      showFeedback('🌟', 'Super!');
      triggerConfetti(['🐸','⭐','🌿']);
      level++;
      if (level % 3 === 0 && patternMissing < 8) patternMissing++;
      setTimeout(nextPattern, 1200);
    }
  }

  // COLORS: Farbreihe merken
  let colorSeq = [];
  let colorUserPick = [];
  let colorLength = 4;

  function startColors() {
    colorLength = 4;
    score = 0;
    level = 1;
    nextColorRound();
  }

  function nextColorRound() {
    colorSeq = Array.from({length: colorLength}, () => Math.floor(Math.random() * COLORS.length));
    colorUserPick = [];
    renderColorsShow();
    setTimeout(() => renderColorsInput(), 1500 + colorLength * 500);
  }

  function renderColorsShow() {
    const tiles = colorSeq.map((idx, i) => `
      <div style="width:60px;height:60px;background:${COLORS[idx].bg};border:3px solid rgba(0,0,0,0.2);border-radius:12px;box-shadow:0 3px 0 rgba(0,0,0,0.2);animation:pop 0.4s ease backwards;animation-delay:${i*0.3}s;"></div>
    `).join('');
    document.getElementById('app').innerHTML = `
      <div class="game-header">
        <button class="icon-btn" onclick="Frog.renderMenu()">🏠</button>
        <div class="game-title">🌈 Runde ${level}</div>
        <div class="score-badge"><span>⭐</span><span>${score}</span></div>
      </div>
      <div class="game-area">
        <div class="question-card" style="width:100%;max-width:500px;">
          <div style="font-family:'Caveat',cursive;font-size:28px;color:var(--shadow);text-align:center;font-weight:700;margin-bottom:18px;">Merke dir die Farben!</div>
          <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;">
            ${tiles}
          </div>
        </div>
      </div>
    `;
  }

  function renderColorsInput() {
    const slots = Array.from({length: colorLength}, (_, i) => {
      const pick = colorUserPick[i];
      if (pick !== undefined) {
        return `<div style="width:52px;height:52px;background:${COLORS[pick].bg};border:3px solid rgba(0,0,0,0.2);border-radius:10px;"></div>`;
      } else {
        return `<div style="width:52px;height:52px;background:white;border:3px dashed #ccc;border-radius:10px;"></div>`;
      }
    }).join('');

    const picker = COLORS.map((c, i) => `
      <button onclick="Frog.pickColor(${i})"
        style="width:70px;height:70px;background:${c.bg};border:4px solid rgba(0,0,0,0.2);border-radius:16px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,0.25);">
      </button>
    `).join('');

    document.getElementById('app').innerHTML = `
      <div class="game-header">
        <button class="icon-btn" onclick="Frog.renderMenu()">🏠</button>
        <div class="game-title">🌈 Runde ${level}</div>
        <div class="score-badge"><span>⭐</span><span>${score}</span></div>
      </div>
      <div class="game-area">
        <div class="question-card" style="width:100%;max-width:500px;">
          <div style="font-family:'Caveat',cursive;font-size:22px;color:var(--shadow);text-align:center;font-weight:700;margin-bottom:14px;">Welche Reihenfolge war es?</div>
          <div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:10px;background:#fff;border:3px dashed #ccc;border-radius:14px;">
            ${slots}
          </div>
          <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;">
            ${picker}
          </div>
          <button class="answer-btn" style="margin-top:14px;" onclick="Frog.undoColor()">↩️ Zurück</button>
        </div>
      </div>
    `;
  }

  function pickColor(idx) {
    if (colorUserPick.length >= colorLength) return;
    colorUserPick.push(idx);
    if (colorUserPick.length === colorLength) {
      // Prüfen
      const correct = colorUserPick.every((v, i) => v === colorSeq[i]);
      if (correct) {
        score++;
        addStars(1);
        showFeedback('🌟', 'Richtig!');
        triggerConfetti(['🐸','⭐','🌈']);
        level++;
        if (colorLength < 10) colorLength++;
        setTimeout(nextColorRound, 1500);
      } else {
        setTimeout(() => {
          showFeedback('💫', 'Oh! Geschafft: ' + score);
          setTimeout(() => renderClassicResult(), 1600);
        }, 400);
      }
    } else {
      renderColorsInput();
    }
  }

  function undoColor() {
    if (colorUserPick.length > 0) {
      colorUserPick.pop();
      renderColorsInput();
    }
  }

  return { start, renderMenu, startMode, tapClassic, tapPattern, pickColor, undoColor };
})();

function placeholderGame(name, emoji, theme) {
  setTheme(theme);
  document.getElementById('app').innerHTML = `
    <div class="game-header">
      <button class="icon-btn" onclick="renderForest()">🏠</button>
      <div class="game-title">${emoji} ${name}</div>
      <div class="score-badge"><span>⭐</span><span>${getStars()}</span></div>
    </div>
    <div class="screen">
      <div style="font-size: 80px;">${emoji}</div>
      <div class="result-big">Kommt bald!</div>
      <div style="color: var(--text); font-size: 18px;">Dieses Spiel wird gerade gebaut 🛠️</div>
    </div>
  `;
}

// iOS Audio-Init
document.body.addEventListener('touchstart', function initAudio() {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance('');
    speechSynthesis.speak(u);
  }
  document.body.removeEventListener('touchstart', initAudio);
}, { once: true });

document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('touchend', function(e) {
  const now = Date.now();
  if (now - (window._lastTouch || 0) < 300) e.preventDefault();
  window._lastTouch = now;
}, { passive: false });
</script>
